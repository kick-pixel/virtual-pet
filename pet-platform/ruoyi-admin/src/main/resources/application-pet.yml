# =====================================================
# PEI AI Platform 模块配置示例
# =====================================================

pet:
  # ==================== 文件存储配置 ====================
  file:
    s3:
      # S3兼容存储的访问密钥ID
      access-key-id: ${S3_ACCESS_KEY_ID:xxxx}
      # S3兼容存储的访问密钥Secret
      access-key-secret: ${S3_ACCESS_KEY_SECRET:xxx}
      # S3兼容存储的端点URL
      # Cloudflare R2: https://<account_id>.r2.cloudflarestorage.com
      # AWS S3: https://s3.<region>.amazonaws.com
      # MinIO: http://localhost:9000
      endpoint: ${S3_ENDPOINT:https://xxx.r2.cloudflarestorage.com}
      # 区域（Cloudflare R2使用auto，AWS S3使用具体区域如us-east-1）
      region: ${S3_REGION:auto}
      # 存储桶名称
      bucket: ${S3_BUCKET:aidog}
      # 公开访问域名（CDN或自定义域名，用于生成文件URL）
      public-domain: ${S3_PUBLIC_DOMAIN:}
      # 是否启用路径样式访问（MinIO需要设为true，AWS S3设为false）
      path-style-access: ${S3_PATH_STYLE_ACCESS:false}
      # 分片上传大小（MB）
      part-size: 10
      # 上传超时时间（秒）
      upload-timeout: 300

  # ==================== Web3支付配置 ====================
  web3:
    # 是否启用区块链交易扫描
    scan-enabled: false
    # 扫描间隔（毫秒），默认15秒
    scan-interval: 15000
    # Infura项目ID（用于以太坊RPC，可选）
    infura-project-id: ${WEB3_INFURA_PROJECT_ID:}
    # 确认交易后是否自动处理
    auto-process-transaction: true

  # ==================== AI模块配置 ====================
  ai:
    provider: ark
    # OpenAI 配置
    openai:
      # OpenAI API密钥
      api-key: ${OPENAI_API_KEY:sk-xxx}
      # OpenAI API基础URL（可选，用于代理或自定义端点）
      # base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      base-url: ${OPENAI_BASE_URL:https://api.xxx.com/v1}
      # 默认视频生成模型
      default-video-model: ${OPENAI_DEFAULT_VIDEO_MODEL:sora-2}
      # 请求超时时间（秒）
      timeout: 60
      # 任务状态轮询间隔（秒）
      poll-interval: 5
      # 最大轮询次数
      max-poll-attempts: 720

    # 火山引擎 Ark 配置（Seedance 模型）
    ark:
      # 火山引擎 API 密钥（获取：https://console.volcengine.com/ark/region:ark+cn-beijing/apiKey）
      api-key: ${ARK_API_KEY:97dd8e63-xxxx-xxx-xxx-d305a2582027}
      # API 基础 URL（默认为北京区域）
      base-url: ${ARK_BASE_URL:https://ark.xxx-xxx.volces.com/api/v3}
      # 默认视频生成模型
      # 可选模型：
      # - doubao-seedance-1-5-pro-251215 (最新，支持音画同生)
      # - doubao-seedance-1-0-pro-250528 (标准版)
      # - doubao-seedance-1-0-pro-fast-251015 (快速版)
      # - doubao-seedance-1-0-lite-t2v-250428 (轻量文生视频)
      # - doubao-seedance-1-0-lite-i2v-250428 (轻量图生视频)
      default-video-model: ${ARK_DEFAULT_VIDEO_MODEL:doubao-seedance-1-5-pro-251215}
      # 请求超时时间（秒）
      timeout: 60
      # 任务状态轮询间隔（秒）
      poll-interval: 10
      # 最大轮询次数（默认 1 小时）
      max-poll-attempts: 360
      # 是否启用水印（默认关闭）
      watermark-enabled: false
      # 是否启用音频生成（默认关闭，仅 1.5 pro 支持）
      audio-enabled: false
